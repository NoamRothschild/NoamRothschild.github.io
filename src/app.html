<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>

		<style>
			body {
				margin: 0;
				width: 100vw;
				height: 100vh;
				/* Main background color */
				background-color: black; 
				/* Create a 1px dot that stays sharp, trailing into transparency */
				background-image: radial-gradient(#6b6b6b 1px, transparent 0);
				/* Controls the spacing between dots (Width x Height) */
				background-size: 24px 24px; 
			}

			h1, p {
				color: white;
			}
		</style>
	</body>
</html>
